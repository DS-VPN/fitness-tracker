services:
  fitness-tracker:
    build: .
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DATABASE_URL: /data/fitness.db
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      ORIGIN: ${ORIGIN}
      PORT: 3000
    volumes:
      - fitness-data:/data

volumes:
  fitness-data:
