services:
  fitness-tracker:
    build: .
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DATABASE_URL: /data/fitness.db
      ORIGIN: ${ORIGIN}
      PORT: 3000
      # Encrypts progress photos at rest — see .env.example. Passed through from your .env; back it up.
      PHOTO_ENCRYPTION_KEY: ${PHOTO_ENCRYPTION_KEY}
      # adapter-node rejects request bodies over 512KB by default, which would block photo uploads
      # (app-level limits are 8MB meal / 12MB progress) — 16M leaves headroom for multipart overhead.
      BODY_SIZE_LIMIT: 16M
    volumes:
      - fitness-data:/data

volumes:
  fitness-data:
