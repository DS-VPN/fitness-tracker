<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
		<meta name="theme-color" content="#faf6f0" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#201a15" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="Personal meal, shopping list, and strength training tracker." />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Fitness" />
		<script>
			// Apply the saved theme before first paint to avoid a flash. 'light'/'dark' set
			// data-theme; anything else (no value = 'system') falls back to prefers-color-scheme.
			(function () {
				try {
					var t = localStorage.getItem('theme');
					if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
