<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Offline · Fitness Tracker</title>
		<style>
			:root {
				color-scheme: light dark;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 12px;
				padding: 24px;
				text-align: center;
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					sans-serif;
				background: #faf6f0;
				color: #2b241d;
			}
			@media (prefers-color-scheme: dark) {
				body {
					background: #201a15;
					color: #f2ece1;
				}
				button {
					background: #e07a44 !important;
				}
			}
			h1 {
				font-size: 1.25rem;
				margin: 0;
			}
			p {
				margin: 0;
				color: #7d7266;
				max-width: 28ch;
			}
			button {
				margin-top: 8px;
				height: 44px;
				padding: 0 20px;
				border: none;
				border-radius: 10px;
				background: #c4602c;
				color: white;
				font-size: 15px;
				font-weight: 500;
			}
		</style>
	</head>
	<body>
		<h1>You're offline</h1>
		<p>Fitness Tracker needs a connection to your server to load your data.</p>
		<button onclick="location.reload()">Try again</button>
	</body>
</html>
